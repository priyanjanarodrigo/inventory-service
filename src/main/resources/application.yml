server:
  port: 8080
  servlet:
    context-path: /inventory-service

spring:
  application:
    name: inventory-service
  profiles:
    default: local

management:
  trace:
    http:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus,env,info,metrics,threaddump,httpexchanges,mappings
      base-path: /management
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5435/inventory-service-db?schema=public
    username: postgres
    password: postgres@16
    driver-class-name: org.postgresql.Driver
    initialization-mode: always
    hikari:
      # Maximum number of connections in the pool
      maximum-pool-size: 30
      # Minimum number of idle connections in the pool
      minimum-idle: 10
      # Maximum time a connection is allowed to sit idle in the pool | in milliseconds (10 minutes)
      idle-timeout: 600000
      # Maximum lifetime of a connection in the pool | in milliseconds (30 minutes)
      max-lifetime: 1800000
      # Timeout for waiting for a connection from the pool | in milliseconds (30 seconds)
      connection-timeout: 30000
      # Name of the Hikari connection pool
      pool-name: HikariConnectionPool-Local
      # Whether to automatically commit transactions
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect